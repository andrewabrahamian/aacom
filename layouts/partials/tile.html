<section id="one" class="tiles" aria-label="Project list">
  {{ range .Site.Params.Tiles.showcase }}
  <article>
    {{ if .image }}
    <span class="image">
      <img src="{{ printf "img/%s" .image | absURL }}" alt="{{ .title }}" />
    </span>
    {{ end }}
    <header class="major">
      <h3><a href="{{ .url | absURL }}" class="link">{{ .title }}</a></h3>
      <p>{{ .subtitle }}</p>
    </header>
  </article>
  {{ end }}
</section>
